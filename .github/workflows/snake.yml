# Generates the contribution-snake SVG and pushes it to the "output" branch.
# Put this file at: .github/workflows/snake.yml  (in your Bravim-Ketan-Purohit/Bravim-Ketan-Purohit repo)

name: Generate Snake Animation

on:
  schedule:
    # Runs every 12 hours so the snake stays fresh
    - cron: "0 */12 * * *"
  # Lets you trigger it manually from the Actions tab
  workflow_dispatch:
  # Regenerate whenever you push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}